<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electric Vibe Music Festival 2025</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Header -->
  <div class="festival-header text-center text-white py-3">
    🔥 Electric Vibe Music Festival 2025 🔥
  </div>

  <!-- Main Section -->
  <div class="container text-center py-5">

    <!-- Equalizer Animation -->

<div class="equalizer">
<span></span>
<span></span>
<span></span>
<span></span>
</div>


    <!-- Artist Buttons -->
    <div class="row g-3 justify-content-center mb-5">
      <div class="col-md-2 col-6">
        <button class="btn artist-btn w-100">DJ Nova</button>
      </div>
      <div class="col-md-2 col-6">
        <button class="btn artist-btn w-100">Electric Beats</button>
      </div>
      <div class="col-md-2 col-6">
        <button class="btn artist-btn w-100">SynthStorm</button>
      </div>
      <div class="col-md-2 col-6">
        <button class="btn artist-btn w-100">Lunar Bass</button>
      </div>
      <div class="col-md-2 col-6">
        <button class="btn artist-btn w-100">GlowRiders</button>
      </div>
    </div>

    <!-- Pricing Cards -->
    <div class="row justify-content-center g-4">

      <div class="col-md-3">
        <div class="card price-card text-center p-4">
          <h4>Standard</h4>
          <h5 class="my-3">$49</h5>
          <button class="btn buy-btn">Buy Now</button>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card price-card text-center p-4">
          <h4>VIP</h4>
          <h5 class="my-3">$99</h5>
          <button class="btn buy-btn">Buy Now</button>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card price-card text-center p-4">
          <h4>Backstage</h4>
          <h5 class="my-3">$149</h5>
          <button class="btn buy-btn">Live Now</button>
        </div>
      </div>

    </div>

   <!-- Festival Rules -->

<div class="accordion mt-5" id="rules">

<div class="accordion-item">

<h2 class="accordion-header">
<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#rule1">
No Outside Food
</button>
</h2>

<div id="rule1" class="accordion-collapse collapse" data-bs-parent="#rules">
<div class="accordion-body">
Outside food and beverages are not allowed inside the festival.
</div>
</div>

</div>


<div class="accordion-item">

<h2 class="accordion-header">
<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#rule2">
Re-entry Policy
</button>
</h2>

<div id="rule2" class="accordion-collapse collapse" data-bs-parent="#rules">
<div class="accordion-body">
No re-entry allowed once you've exited the festival grounds.
</div>
</div>

</div>

</div>

</div>

  <!-- Footer -->
   <footer>
  <p>Follow Us</p>

<div class="social">

<i class="bi bi-facebook"></i>
<i class="bi bi-instagram"></i>
<i class="bi bi-twitter"></i>


</div>
</footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
